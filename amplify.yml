version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        # Use a heredoc to create the .env file safely with all variables
        - |
          cat <<EOF > .env.production
          AZURE_BLOB_URL_C1="$AZURE_BLOB_URL_C1"
          AZURE_BLOB_URL_C2="$AZURE_BLOB_URL_C2"
          AZURE_BLOB_URL_CB="$AZURE_BLOB_URL_CB"
          AZURE_BLOB_URL_CI="$AZURE_BLOB_URL_CI"
          AZURE_SEARCH_API_KEY="$AZURE_SEARCH_API_KEY"
          AZURE_SEARCH_ENDPOINT="$AZURE_SEARCH_ENDPOINT"
          NEXT_PUBLIC_DEV_SUPABASE_REDIRECT_URL="$NEXT_PUBLIC_DEV_SUPABASE_REDIRECT_URL"
          NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY"
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY="$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY"
          NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL"
          PAYPAL_CLIENT_ID="$PAYPAL_CLIENT_ID"
          PAYPAL_CLIENT_SECRET="$PAYPAL_CLIENT_SECRET"
          PAYPAL_MODE="$PAYPAL_MODE"
          POSTGRES_DATABASE="$POSTGRES_DATABASE"
          POSTGRES_HOST="$POSTGRES_HOST"
          POSTGRES_PASSWORD="$POSTGRES_PASSWORD"
          POSTGRES_PRISMA_URL="$POSTGRES_PRISMA_URL"
          POSTGRES_URL="$POSTGRES_URL"
          POSTGRES_URL_NON_POOLING="$POSTGRES_URL_NON_POOLING"
          POSTGRES_USER="$POSTGRES_USER"
          SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
          SUPABASE_JWT_SECRET="$SUPABASE_JWT_SECRET"
          SUPABASE_PUBLISHABLE_KEY="$SUPABASE_PUBLISHABLE_KEY"
          SUPABASE_SECRET_KEY="$SUPABASE_SECRET_KEY"
          SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY"
          SUPABASE_URL="$SUPABASE_URL"
          AI_GATEWAY_API_KEY="$AI_GATEWAY_API_KEY"
          EOF
        # Verification: Check if the file was created (wont show values for security)
        - ls -la .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
